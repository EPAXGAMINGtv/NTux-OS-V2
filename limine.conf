# Timeout in seconds that Limine will use before automatically booting.
timeout: 5
resolution=1920x1080
# The entry name that will be displayed in the boot menu.
/NTux OS
    # We use the Limine boot protocol.
    protocol: limine
    # Path to the kernel to boot. boot():/ represents the partition on which limine.conf is located.
    path: boot():/boot/kernel
    module_path: boot():/boot/modules/konsole.elf
    module_string: konsole
    module_path: boot():/boot/modules/login.elf
    module_string: login
    module_path: boot():/boot/modules/desktop.elf
    module_string: desktop
    module_path: boot():/boot/modules/installer.elf
    module_string: installer
    module_path: boot():/boot/modules/installer_term.elf
    module_string: installer_term
    module_path: boot():/boot/modules/deskconsole.elf
    module_string: deskconsole
