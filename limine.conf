    module_string: explorer
    module_path: boot():/boot/modules/editor.elf
    module_string: editor
    module_path: boot():/boot/modules/bench.elf
    module_string: bench
    module_path: boot():/boot/modules/imgview.elf
    module_string: imgview
    module_path: boot():/boot/modules/objview.elf
    module_string: objview
    module_path: boot():/boot/modules/flappy.elf
    module_string: flappy
    module_path: boot():/boot/modules/taskmgr.elf
    module_string: taskmgr
    module_path: boot():/boot/modules/tetris.elf
    module_string: tetris
    module_path: boot():/boot/modules/deskdemo.elf
    module_string: deskdemo
    module_path: boot():/boot/modules/screensaver.elf
    module_string: screensaver
    module_path: boot():/boot/modules/xeyes.elf 
    module_string: xeyes
    module_path: boot():/boot/modules/settings.elf
    module_string: settings
    module_path: boot():/boot/modules/partutil.elf
    module_string: partutil
    module_path: boot():/boot/modules/browser.elf
    module_string: browser
    module_path: boot():/boot/modules/paint.elf
    module_string: paint
    module_path: boot():/boot/modules/snake.elf
    module_string: snake
    module_path: boot():/boot/modules/snake2.elf
    module_string: snake2
    module_path: boot():/boot/modules/calc.elf
    module_string: calc
